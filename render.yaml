services:
  - type: web
    name: new-fintee
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        value: your_database_url_here
      - key: JWT_SECRET
        value: your_jwt_secret_here
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: JWT_REFRESH_TTL_DAYS
        value: 30
      - key: PORT
        value: 3000
